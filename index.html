<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pac-Man</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #fff; }
    canvas { display: block; border: 2px solid #00f; }
    #ui { display: flex; gap: 24px; margin-bottom: 8px; font-size: 16px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .p1 { color: #ff0; }
    .p2 { color: #f9f; }
    #p2ui { display: none; }
    #message { margin-top: 8px; font-size: 18px; color: #ff0; min-height: 22px; text-align: center; }
    #controls { margin-top: 6px; font-size: 12px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <div id="ui">
    <span class="p1">P1 SCORE: <span id="score">0</span></span>
    <span class="p1">LIVES: <span id="lives">3</span></span>
    <span>LEVEL: <span id="level">1</span></span>
    <span id="p2ui">
      <span class="p2">P2 SCORE: <span id="score2">0</span></span>
      &nbsp;
      <span class="p2">LIVES: <span id="lives2">3</span></span>
    </span>
  </div>
  <canvas id="game"></canvas>
  <div id="message">Press ENTER (1P) or TAB (2P) to start</div>
  <div id="controls">P1: Arrow keys &nbsp;|&nbsp; P2: WASD</div>
  <script src="game.js"></script>
</body>
</html>
